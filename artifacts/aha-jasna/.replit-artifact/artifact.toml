kind = "web"
previewPath = "/"
title = "AHA Jasná — Atraktívne Horské Apartmány"
version = "1.0.0"
id = "artifacts/aha-jasna"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23932

[services.development]
run = "pnpm --filter @workspace/aha-jasna run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aha-jasna", "run", "build" ]
publicDir = "artifacts/aha-jasna/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23932"
BASE_PATH = "/"
